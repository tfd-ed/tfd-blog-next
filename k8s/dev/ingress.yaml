apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tfd-blog-ingress
  namespace: dev
  labels:
    app: tfd-blog
    environment: dev
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: dev.tfdevs.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tfd-blog-service
                port:
                  number: 80
